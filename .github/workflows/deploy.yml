name: Deploy to Production (fuira.shop)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Start Services (DB for Tests)
        run: |
          docker compose up -d db
          # Check health or wait
          sleep 10

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Setup Database Schema
        working-directory: ./backend
        run: |
          export DATABASE_URL="postgresql://user:password@localhost:5432/mydatabase"
          npx prisma db push --skip-generate

      - name: Run Tests
        working-directory: ./backend
        run: |
          export DATABASE_URL="postgresql://user:password@localhost:5432/mydatabase"
          export JWT_SECRET="test-secret"
          npm test


      - name: Cleanup
        if: always()
        run: docker compose down

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code

        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fuira-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fuira-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /apps/fuira-shop || mkdir -p /apps/fuira-shop && cd /apps/fuira-shop
            
            # Docker Hub'dan en güncel imajları çek
            docker compose pull
            
            # Servisleri güncelle/yeniden başlat
            docker compose up -d --remove-orphans
            
            # Gereksiz eski imajları temizle
            docker image prune -f
